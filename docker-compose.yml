services:
  polsho:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: polsho
    container_name: polsho
    ports:
      - '${APP_PORT:-8000}:8000'
      - '${REVERB_SERVER_PORT:-8081}:8081'
    environment:
      WWWUSER: '${WWWUSER}'
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - .:/var/www
    networks:
      - dev

networks:
  dev:
    external: true
    name: base_network
